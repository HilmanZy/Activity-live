<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Token Live Activity</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #090c10;
    --surface: #0e1117;
    --border: #1e2530;
    --buy: #00ff88;
    --sell: #ff3b6b;
    --accent: #00c2ff;
    --text: #e2e8f0;
    --muted: #4a5568;
    --card: #111620;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,194,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,194,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .header-left { flex: 1; min-width: 0; }

  .label-live {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,59,107,0.12);
    border: 1px solid rgba(255,59,107,0.3);
    color: var(--sell);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 4px 10px;
    border-radius: 2px;
    margin-bottom: 10px;
    text-transform: uppercase;
  }

  .pulse-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--sell);
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  .page-title {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.5px;
    line-height: 1.2;
  }

  .contract-addr {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    word-break: break-all;
  }

  .contract-addr span {
    color: var(--accent);
    cursor: pointer;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .stat-pill {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 4px;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .stat-pill strong {
    color: var(--text);
    font-size: 13px;
  }

  .stat-pill.buy-stat strong { color: var(--buy); }
  .stat-pill.sell-stat strong { color: var(--sell); }

  /* Links bar */
  .links-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .ext-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 3px;
    text-decoration: none;
    transition: all 0.15s;
    font-family: 'Space Mono', monospace;
  }

  .ext-link:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .ext-link.zora:hover { border-color: #9b59b6; color: #9b59b6; }
  .ext-link.base:hover { border-color: #0070f3; color: #0070f3; }

  /* Setup form */
  .setup-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 32px;
    text-align: center;
    margin-top: 60px;
  }

  .setup-box h2 {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: #fff;
    margin-bottom: 8px;
  }

  .setup-box p {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 24px;
    line-height: 1.7;
  }

  .setup-input {
    width: 100%;
    max-width: 480px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 12px 16px;
    border-radius: 4px;
    outline: none;
    margin-bottom: 12px;
    display: block;
    margin-left: auto;
    margin-right: auto;
    transition: border-color 0.15s;
  }

  .setup-input:focus { border-color: var(--accent); }

  .setup-btn {
    background: var(--accent);
    color: #000;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    padding: 12px 28px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: opacity 0.15s;
  }

  .setup-btn:hover { opacity: 0.85; }

  /* Table */
  .activity-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .table-header {
    display: grid;
    grid-template-columns: 40px 1fr 80px 90px 90px 60px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    gap: 8px;
  }

  .activity-list {
    max-height: 70vh;
    overflow-y: auto;
  }

  .activity-list::-webkit-scrollbar { width: 4px; }
  .activity-list::-webkit-scrollbar-track { background: var(--bg); }
  .activity-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .activity-row {
    display: grid;
    grid-template-columns: 40px 1fr 80px 90px 90px 60px;
    padding: 11px 16px;
    border-bottom: 1px solid rgba(30,37,48,0.7);
    font-size: 12px;
    gap: 8px;
    align-items: center;
    transition: background 0.1s;
    animation: rowIn 0.3s ease forwards;
  }

  @keyframes rowIn {
    from { opacity: 0; transform: translateX(-6px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .activity-row:hover { background: rgba(255,255,255,0.02); }
  .activity-row.new-row { background: rgba(0,194,255,0.04); }

  .row-num {
    color: var(--muted);
    font-size: 10px;
    text-align: center;
  }

  .row-addr {
    color: var(--accent);
    font-size: 11px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    cursor: pointer;
  }

  .row-addr:hover { text-decoration: underline; }

  .row-type {
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.5px;
  }

  .row-type.BUY  { color: var(--buy); }
  .row-type.SELL { color: var(--sell); }

  .row-amount {
    color: var(--text);
    font-size: 11px;
    text-align: right;
  }

  .row-price {
    color: #ffd166;
    font-size: 11px;
    text-align: right;
  }

  .row-time {
    color: var(--muted);
    font-size: 10px;
    text-align: right;
  }

  /* Empty state */
  .empty-state {
    padding: 48px 24px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    line-height: 2;
  }

  .spinner {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--card);
    border: 1px solid var(--border);
    padding: 12px 18px;
    border-radius: 4px;
    font-size: 12px;
    color: var(--text);
    z-index: 999;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.2s;
    max-width: 300px;
  }

  .toast.show { opacity: 1; transform: translateY(0); }

  /* Error banner */
  .error-banner {
    background: rgba(255,59,107,0.08);
    border: 1px solid rgba(255,59,107,0.25);
    color: var(--sell);
    padding: 10px 16px;
    border-radius: 4px;
    font-size: 11px;
    margin-bottom: 16px;
    display: none;
  }

  @media (max-width: 600px) {
    .table-header,
    .activity-row {
      grid-template-columns: 30px 1fr 60px 80px 70px 50px;
      font-size: 10px;
      padding: 9px 10px;
      gap: 4px;
    }
  }
</style>
</head>
<body>

<div class="container">

  <!-- Setup screen (shown when no contract in URL) -->
  <div id="setup-screen" class="setup-box" style="display:none;">
    <h2>Token Live Activity</h2>
    <p>Masukkan contract address token yang ingin dipantau.<br>Halaman ini akan auto-refresh setiap blok baru.</p>
    <input class="setup-input" id="manual-contract" type="text" placeholder="0x... contract address" />
    <input class="setup-input" id="manual-rpc" type="text" placeholder="RPC URL (opsional)" />
    <button class="setup-btn" onclick="startFromForm()">▶ MULAI PANTAU</button>
  </div>

  <!-- Live screen -->
  <div id="live-screen" style="display:none;">
    <div class="header">
      <div class="header-left">
        <div class="label-live"><span class="pulse-dot"></span> LIVE</div>
        <div class="page-title" id="token-title">Token Activity</div>
        <div class="contract-addr">Contract: <span id="contract-display" onclick="copyContract()">—</span></div>
      </div>
    </div>

    <div class="error-banner" id="error-banner"></div>

    <div class="status-bar">
      <div class="stat-pill">Total TX <strong id="stat-total">0</strong></div>
      <div class="stat-pill buy-stat">Buy <strong id="stat-buy">0</strong></div>
      <div class="stat-pill sell-stat">Sell <strong id="stat-sell">0</strong></div>
      <div class="stat-pill">Block <strong id="stat-block">—</strong></div>
      <div class="stat-pill">Vol <strong id="stat-vol">$0</strong></div>
    </div>

    <div class="links-bar" id="links-bar"></div>

    <div class="activity-wrap">
      <div class="table-header">
        <span>#</span>
        <span>ADDRESS</span>
        <span>TYPE</span>
        <span style="text-align:right">AMOUNT</span>
        <span style="text-align:right">PRICE</span>
        <span style="text-align:right">TIME</span>
      </div>
      <div class="activity-list" id="activity-list">
        <div class="empty-state">
          <span class="spinner"></span> Menunggu transaksi pertama...
        </div>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ==================== CONFIG ====================
const DEFAULT_RPC = "https://base-mainnet.g.alchemy.com/v2/qjHYRYDCGd3pSsBgMdRPI";
const POLL_MS     = 2500; // poll setiap 2.5 detik
const ZORA_FACTORY = "0x777777722d078c97c6ad07d9f36801e653e356ae";
const NULL_ADDR    = "0x0000000000000000000000000000000000000000";

// Transfer event topic
const TRANSFER_TOPIC = "0xddf252ad1be2c89b69c2b068fc378daa952ba7f163c4a11628f55a4df523b3ef";

// ==================== STATE ====================
let contractAddress = "";
let rpcUrl          = DEFAULT_RPC;
let lastBlock       = null;
let activities      = []; // newest first
let statBuy = 0, statSell = 0, statVol = 0;
let polling = null;

// ==================== URL PARAMS ====================
function getParams() {
  const p = new URLSearchParams(window.location.search);
  return {
    contract : (p.get("contract") || p.get("c") || "").toLowerCase().trim(),
    rpc      : p.get("rpc") || "",
    creator  : (p.get("creator") || "").toLowerCase().trim(),
    name     : p.get("name") || "",
  };
}

// ==================== BASE.APP ENCODER ====================
function contractToBaseApp(addr) {
  const network = new TextEncoder().encode("networks/base-mainnet");
  const addrB   = new TextEncoder().encode(addr.toLowerCase());

  const inner = new Uint8Array([
    0x0a, network.length, ...network,
    0x12, addrB.length,   ...addrB,
  ]);
  const middle = new Uint8Array([0x0a, inner.length, ...inner]);
  const outer  = new Uint8Array([0x12, middle.length, ...middle]);

  const b64 = btoa(String.fromCharCode(...outer))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
  return `https://base.app/content/${b64}`;
}

// ==================== RPC HELPER ====================
async function rpcCall(method, params) {
  const res = await fetch(rpcUrl, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ jsonrpc: "2.0", id: 1, method, params }),
  });
  const json = await res.json();
  if (json.error) throw new Error(json.error.message);
  return json.result;
}

async function getLatestBlock() {
  const hex = await rpcCall("eth_blockNumber", []);
  return parseInt(hex, 16);
}

async function getLogs(fromBlock, toBlock) {
  return await rpcCall("eth_getLogs", [{
    fromBlock: "0x" + fromBlock.toString(16),
    toBlock:   "0x" + toBlock.toString(16),
    address:   contractAddress,
    topics:    [TRANSFER_TOPIC],
  }]);
}

async function getBlockTimestamp(blockHex) {
  const blk = await rpcCall("eth_getBlockByNumber", [blockHex, false]);
  return blk ? parseInt(blk.timestamp, 16) : null;
}

// ==================== INIT ====================
window.addEventListener("load", async () => {
  const { contract, rpc, creator, name } = getParams();

  if (rpc) rpcUrl = rpc;

  if (contract && contract.startsWith("0x") && contract.length === 42) {
    contractAddress = contract;
    startLive(contract, creator, name);
  } else {
    document.getElementById("setup-screen").style.display = "block";
  }
});

function startFromForm() {
  const c = document.getElementById("manual-contract").value.trim().toLowerCase();
  const r = document.getElementById("manual-rpc").value.trim();
  if (!c || !c.startsWith("0x") || c.length !== 42) {
    showToast("⚠️ Contract address tidak valid");
    return;
  }
  if (r) rpcUrl = r;
  contractAddress = c;

  // Update URL tanpa reload
  const url = new URL(window.location);
  url.searchParams.set("contract", c);
  window.history.replaceState({}, "", url);

  startLive(c, "", "");
}

async function startLive(contract, creator, name) {
  document.getElementById("setup-screen").style.display = "none";
  document.getElementById("live-screen").style.display  = "block";

  // Display
  const short = contract.slice(0, 6) + "..." + contract.slice(-4);
  document.getElementById("token-title").textContent =
    name ? `${name}` : `Token ${short}`;
  document.getElementById("contract-display").textContent = contract;

  // Links
  buildLinks(contract, creator);

  // Start polling
  try {
    lastBlock = await getLatestBlock();
    document.getElementById("stat-block").textContent = lastBlock;
  } catch(e) {
    showError("Gagal konek ke RPC: " + e.message);
  }

  // Load last 500 blok history
  loadHistory(contract, lastBlock);

  // Polling loop
  polling = setInterval(pollNewBlocks, POLL_MS);
}

// ==================== LINKS ==================== 
function buildLinks(contract, creator) {
  const bar = document.getElementById("links-bar");
  const zoraUrl    = `https://zora.co/coin/base:${contract}`;
  const baseUrl    = contractToBaseApp(contract);
  const scanUrl    = `https://basescan.org/token/${contract}`;

  bar.innerHTML = `
    <a class="ext-link" href="${zoraUrl}"    target="_blank">🟣 Zora</a>
    <a class="ext-link base" href="${baseUrl}" target="_blank">🔵 Base.app</a>
    <a class="ext-link" href="${scanUrl}"   target="_blank">🔍 Basescan</a>
  `;
}

// ==================== HISTORY ====================
async function loadHistory(contract, currentBlock) {
  const FROM_BLOCK = Math.max(0, currentBlock - 500);
  showError("");
  try {
    const logs = await getLogs(FROM_BLOCK, currentBlock);
    // Process oldest first, then reverse display
    const rows = [];
    for (const log of logs) {
      const row = await parseLog(log);
      if (row) rows.push(row);
    }
    // rows oldest first → display newest first (prepend)
    for (const row of rows.reverse()) {
      addRow(row, false);
    }
    if (rows.length === 0) {
      document.getElementById("activity-list").innerHTML =
        `<div class="empty-state"><span class="spinner"></span> Menunggu transaksi...</div>`;
    }
  } catch(e) {
    showError("Error load history: " + e.message);
  }
}

// ==================== POLLING ====================
async function pollNewBlocks() {
  try {
    const latest = await getLatestBlock();
    if (latest <= lastBlock) return;

    document.getElementById("stat-block").textContent = latest;

    const logs = await getLogs(lastBlock + 1, latest);
    for (const log of logs.reverse()) { // reverse = newest first
      const row = await parseLog(log);
      if (row) addRow(row, true);
    }
    lastBlock = latest;
  } catch(e) {
    // silently ignore poll errors
    console.warn("Poll error:", e.message);
  }
}

// ==================== PARSE LOG ====================
async function parseLog(log) {
  if (!log.topics || log.topics.length < 3) return null;

  const from = "0x" + log.topics[1].slice(-40);
  const to   = "0x" + log.topics[2].slice(-40);

  // Skip mint from null
  const isMint = from.toLowerCase() === NULL_ADDR;

  // Determine buy/sell based on from/to
  // If from == null → mint (skip or treat as buy)
  // Heuristic: if 'from' is a known DEX/router → buy, else sell
  // Simpler: if token goes FROM contract pool → buy; TO contract pool → sell
  // We'll just show all transfers and label based on direction

  let type = "BUY";
  // If from is the contract itself or null = mint/buy
  // If to is 0x0 = burn/sell
  if (to.toLowerCase() === NULL_ADDR) {
    type = "SELL";
  } else if (isMint) {
    type = "BUY";
  } else {
    // Generic: show as BUY if to is an EOA/user, SELL if from is user to pool
    type = "BUY";
  }

  // Amount from data field
  let amount = 0;
  try {
    amount = parseInt(log.data, 16);
  } catch(e) {}

  // Format amount
  const amountFmt = formatAmount(amount);

  // Timestamp
  let timeStr = "—";
  try {
    const ts = await getBlockTimestamp(log.blockNumber);
    if (ts) timeStr = formatRelTime(ts);
  } catch(e) {}

  const blockNum = parseInt(log.blockNumber, 16);
  const txHash   = log.transactionHash;

  return { from, to, type, amount, amountFmt, timeStr, blockNum, txHash };
}

// ==================== ADD ROW ====================
function addRow(row, isNew) {
  // Remove empty state if present
  const list = document.getElementById("activity-list");
  const empty = list.querySelector(".empty-state");
  if (empty) empty.remove();

  // Update stats
  activities.unshift(row);
  if (row.type === "BUY")  statBuy++;
  else statSell++;
  document.getElementById("stat-total").textContent = activities.length;
  document.getElementById("stat-buy").textContent   = statBuy;
  document.getElementById("stat-sell").textContent  = statSell;

  // Render row
  const idx  = activities.length;
  const el   = document.createElement("div");
  el.className = "activity-row" + (isNew ? " new-row" : "");
  el.dataset.tx = row.txHash;

  const addrDisp = row.type === "BUY"
    ? shortenAddr(row.to)
    : shortenAddr(row.from);

  el.innerHTML = `
    <span class="row-num">${idx}</span>
    <span class="row-addr" title="${row.to}" onclick="openAddr('${row.type === 'BUY' ? row.to : row.from}')">${addrDisp}</span>
    <span class="row-type ${row.type}">${row.type}</span>
    <span class="row-amount">${row.amountFmt}</span>
    <span class="row-price">—</span>
    <span class="row-time">${row.timeStr}</span>
  `;

  // Newest on top
  list.insertBefore(el, list.firstChild);

  // Remove new-row highlight after 2s
  if (isNew) {
    setTimeout(() => el.classList.remove("new-row"), 2000);
  }

  // Re-number all rows
  renumber();
}

function renumber() {
  const rows = document.querySelectorAll(".activity-row");
  rows.forEach((r, i) => {
    const numEl = r.querySelector(".row-num");
    if (numEl) numEl.textContent = rows.length - i; // newest = highest number
  });
}

// ==================== UTILS ====================
function shortenAddr(addr) {
  if (!addr) return "—";
  return addr.slice(0, 6) + "..." + addr.slice(-4);
}

function formatAmount(raw) {
  if (!raw || raw === 0) return "—";
  // Assume 18 decimals
  const val = raw / 1e18;
  if (val >= 1e9)  return (val / 1e9).toFixed(2) + "B";
  if (val >= 1e6)  return (val / 1e6).toFixed(2) + "M";
  if (val >= 1000) return (val / 1000).toFixed(2) + "k";
  return val.toFixed(4);
}

function formatRelTime(ts) {
  const diff = Math.floor(Date.now() / 1000) - ts;
  if (diff < 60)   return diff + "s";
  if (diff < 3600) return Math.floor(diff / 60) + "m";
  if (diff < 86400)return Math.floor(diff / 3600) + "h";
  return Math.floor(diff / 86400) + "d";
}

function openAddr(addr) {
  window.open(`https://basescan.org/address/${addr}`, "_blank");
}

function copyContract() {
  navigator.clipboard.writeText(contractAddress).then(() => {
    showToast("✅ Contract address disalin!");
  });
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

function showError(msg) {
  const el = document.getElementById("error-banner");
  if (!el) return;
  if (msg) {
    el.textContent = "⚠️ " + msg;
    el.style.display = "block";
  } else {
    el.style.display = "none";
  }
}
</script>
</body>
</html>
